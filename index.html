<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Unterrichtsverwaltung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #e8c547;
    --accent2: #f4a261;
    --text: #f0ede8;
    --text-muted: #8a8a9a;
    --green: #52b788;
    --red: #e63946;
    --orange: #f4a261;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .header-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }

  /* NAV */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-btn .nav-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

  /* PAGES */
  .page { display: none; padding: 20px; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1rem; }
  .card-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  select.form-input option { background: var(--surface2); }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0f0f1a; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(230,57,70,0.15); color: var(--red); border: 1px solid rgba(230,57,70,0.3); }
  .btn-full { width: 100%; justify-content: center; }
  .btn-sm { padding: 7px 12px; font-size: 0.78rem; }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-45 { background: rgba(232,197,71,0.15); color: var(--accent); }
  .badge-30 { background: rgba(244,162,97,0.15); color: var(--accent2); }

  /* STUDENT LIST */
  .student-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .student-item:active { border-color: var(--accent); }
  .student-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: #0f0f1a;
    font-weight: bold;
    flex-shrink: 0;
  }
  .student-info { flex: 1; margin-left: 12px; }
  .student-name { font-weight: 600; font-size: 0.95rem; }
  .student-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .student-actions { display: flex; gap: 6px; }

  /* ATTENDANCE */
  .att-btn {
    flex: 1;
    padding: 14px 8px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .att-btn .att-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .att-btn.selected-present { border-color: var(--green); background: rgba(82,183,136,0.12); color: var(--green); }
  .att-btn.selected-excused { border-color: var(--accent); background: rgba(232,197,71,0.12); color: var(--accent); }
  .att-btn.selected-absent { border-color: var(--red); background: rgba(230,57,70,0.12); color: var(--red); }

  .att-date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .att-date-nav {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 500;
  }
  .att-date-display {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--accent);
    text-align: center;
  }

  .att-student-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .att-student-name { font-weight: 600; margin-bottom: 10px; }
  .att-buttons { display: flex; gap: 8px; }

  /* STATS */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--accent); }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* MONATSABRECHNUNG */
  .month-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .month-row:last-child { border-bottom: none; }
  .month-student { font-weight: 500; }
  .month-detail { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .month-amount { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
  .amount-green { color: var(--green); }
  .amount-red { color: var(--red); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--accent); margin-bottom: 20px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-text { font-size: 0.85rem; }

  /* MONTH PICKER */
  .month-picker { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 20px; }
  .month-picker select.form-input { text-align: center; }

  /* HISTORY DOTS */
  .history-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-present { background: var(--green); }
  .dot-excused { background: var(--accent); }
  .dot-absent { background: var(--red); }

  /* CHIP */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 0.75rem;
  }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .text-muted { color: var(--text-muted); font-size: 0.82rem; }
  .text-right { text-align: right; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .flex-end { display: flex; gap: 8px; justify-content: flex-end; }

  /* PROFIT HIGHLIGHT */
  .profit-box {
    background: linear-gradient(135deg, rgba(82,183,136,0.1), rgba(82,183,136,0.05));
    border: 1px solid rgba(82,183,136,0.3);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    margin-top: 16px;
  }
  .profit-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .profit-value { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--green); margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Unterricht</div>
    <div class="header-sub">Schülerverwaltung</div>
  </div>
  <div id="headerDate" style="font-size:0.75rem;color:var(--text-muted);text-align:right;"></div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('schueler')">
    <span class="nav-icon">👤</span>Schüler
  </button>
  <button class="nav-btn" onclick="showPage('anwesenheit')">
    <span class="nav-icon">📋</span>Anwesenheit
  </button>
  <button class="nav-btn" onclick="showPage('abrechnung')">
    <span class="nav-icon">💶</span>Abrechnung
  </button>
  <button class="nav-btn" onclick="showPage('statistik')">
    <span class="nav-icon">📊</span>Statistik
  </button>
</div>

<!-- ==================== SCHÜLER ==================== -->
<div class="page active" id="page-schueler">
  <div class="section-title">Schüler</div>
  <button class="btn btn-primary btn-full" onclick="openAddStudent()">+ Neuen Schüler hinzufügen</button>
  <div class="mt-16" id="studentList"></div>
</div>

<!-- ==================== ANWESENHEIT ==================== -->
<div class="page" id="page-anwesenheit">
  <div class="section-title">Anwesenheit</div>
  <div class="att-date-row">
    <button class="att-date-nav" onclick="changeDate(-1)">◀</button>
    <div>
      <div class="att-date-display" id="attDateDisplay"></div>
      <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;" id="attWeekday"></div>
    </div>
    <button class="att-date-nav" onclick="changeDate(1)">▶</button>
  </div>
  <div id="attStudentList"></div>
</div>

<!-- ==================== ABRECHNUNG ==================== -->
<div class="page" id="page-abrechnung">
  <div class="section-title">Monatsabrechnung</div>
  <div class="month-picker">
    <select class="form-input" id="billMonth" onchange="renderBilling()" style="max-width:140px;">
    </select>
    <select class="form-input" id="billYear" onchange="renderBilling()" style="max-width:100px;">
    </select>
  </div>
  <div id="billingContent"></div>
</div>

<!-- ==================== STATISTIK ==================== -->
<div class="page" id="page-statistik">
  <div class="section-title">Statistik</div>
  <div class="stat-grid" id="statsGrid"></div>
  <div id="statsDetail"></div>
</div>

<!-- ==================== MODAL: SCHÜLER HINZUFÜGEN/BEARBEITEN ==================== -->
<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Neuer Schüler</div>

    <div class="form-group">
      <label class="form-label">Vorname *</label>
      <input class="form-input" id="f_vorname" placeholder="z.B. Anna" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Nachname *</label>
      <input class="form-input" id="f_nachname" placeholder="z.B. Müller" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Telefon</label>
      <input class="form-input" id="f_telefon" placeholder="+49 ..." type="tel">
    </div>
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input class="form-input" id="f_email" placeholder="name@beispiel.de" type="email">
    </div>
    <div class="divider"></div>
    <div style="font-family:'DM Serif Display',serif;font-size:1rem;color:var(--accent);margin-bottom:14px;">Vertragsdaten</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Unterrichtsdauer</label>
        <select class="form-input" id="f_dauer">
          <option value="45">45 Minuten</option>
          <option value="30">30 Minuten</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Stunden/Woche</label>
        <select class="form-input" id="f_stundenProWoche">
          <option value="1">1x pro Woche</option>
          <option value="2">2x pro Woche</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Monatspauschale (€) *</label>
      <input class="form-input" id="f_pauschale" placeholder="z.B. 120" type="number" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Unterrichtstag(e)</label>
      <input class="form-input" id="f_tag" placeholder="z.B. Montag, Donnerstag">
    </div>
    <div class="form-group">
      <label class="form-label">Notizen</label>
      <textarea class="form-input" id="f_notizen" placeholder="Besonderheiten..." rows="3" style="resize:none;"></textarea>
    </div>

    <div class="flex-end mt-16">
      <button class="btn btn-ghost" onclick="closeModal('studentModal')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveStudent()" id="saveStudentBtn">Speichern</button>
    </div>
    <div id="editDeleteRow" style="margin-top:10px;display:none;">
      <button class="btn btn-danger btn-full" onclick="deleteStudent()">Schüler löschen</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
let students = JSON.parse(localStorage.getItem('uv_students') || '[]');
let attendance = JSON.parse(localStorage.getItem('uv_attendance') || '{}');
// attendance[date][studentId] = 'present' | 'excused' | 'absent'

let editingStudentId = null;
let currentAttDate = new Date();
currentAttDate.setHours(0,0,0,0);

function save() {
  localStorage.setItem('uv_students', JSON.stringify(students));
  localStorage.setItem('uv_attendance', JSON.stringify(attendance));
}

// ==================== NAV ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const idx = ['schueler','anwesenheit','abrechnung','statistik'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(id === 'anwesenheit') renderAttendance();
  if(id === 'abrechnung') renderBilling();
  if(id === 'statistik') renderStats();
}

// ==================== HEADER DATE ====================
function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
}
updateHeaderDate();

// ==================== STUDENTS ====================
function renderStudents() {
  const list = document.getElementById('studentList');
  if(students.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Noch keine Schüler erfasst.<br>Füge deinen ersten Schüler hinzu!</div></div>`;
    return;
  }
  list.innerHTML = students.map(s => {
    const initials = (s.vorname[0]||'') + (s.nachname[0]||'');
    const hist = getStudentHistory(s.id);
    const dots = hist.slice(-10).map(d =>
      `<div class="dot dot-${d}"></div>`
    ).join('');
    return `<div class="student-item" onclick="openEditStudent('${s.id}')">
      <div class="student-avatar">${initials.toUpperCase()}</div>
      <div class="student-info">
        <div class="student-name">${s.vorname} ${s.nachname}</div>
        <div class="student-meta">
          <span class="badge ${s.dauer==45?'badge-45':'badge-30'}">${s.dauer} Min</span>
          &nbsp;${s.tag || '—'} &nbsp;·&nbsp; ${formatEuro(s.pauschale)}/Monat
        </div>
        <div class="history-dots mt-8">${dots}</div>
      </div>
      <div style="color:var(--text-muted);font-size:1.2rem;">›</div>
    </div>`;
  }).join('');
}

function getStudentHistory(id) {
  const result = [];
  Object.keys(attendance).sort().forEach(date => {
    if(attendance[date][id]) result.push(attendance[date][id]);
  });
  return result;
}

function openAddStudent() {
  editingStudentId = null;
  document.getElementById('modalTitle').textContent = 'Neuer Schüler';
  document.getElementById('saveStudentBtn').textContent = 'Speichern';
  document.getElementById('editDeleteRow').style.display = 'none';
  clearForm();
  openModal('studentModal');
}

function openEditStudent(id) {
  editingStudentId = id;
  const s = students.find(x => x.id === id);
  if(!s) return;
  document.getElementById('modalTitle').textContent = s.vorname + ' ' + s.nachname;
  document.getElementById('saveStudentBtn').textContent = 'Aktualisieren';
  document.getElementById('editDeleteRow').style.display = 'block';
  document.getElementById('f_vorname').value = s.vorname || '';
  document.getElementById('f_nachname').value = s.nachname || '';
  document.getElementById('f_telefon').value = s.telefon || '';
  document.getElementById('f_email').value = s.email || '';
  document.getElementById('f_dauer').value = s.dauer || 45;
  document.getElementById('f_stundenProWoche').value = s.stundenProWoche || 1;
  document.getElementById('f_pauschale').value = s.pauschale || '';
  document.getElementById('f_tag').value = s.tag || '';
  document.getElementById('f_notizen').value = s.notizen || '';
  openModal('studentModal');
}

function clearForm() {
  ['f_vorname','f_nachname','f_telefon','f_email','f_pauschale','f_tag','f_notizen'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_dauer').value = 45;
  document.getElementById('f_stundenProWoche').value = 1;
}

function saveStudent() {
  const vorname = document.getElementById('f_vorname').value.trim();
  const nachname = document.getElementById('f_nachname').value.trim();
  const pauschale = parseFloat(document.getElementById('f_pauschale').value);
  if(!vorname || !nachname) { alert('Vor- und Nachname sind Pflichtfelder.'); return; }
  if(!pauschale || pauschale <= 0) { alert('Bitte gib eine gültige Monatspauschale ein.'); return; }

  const data = {
    vorname, nachname,
    telefon: document.getElementById('f_telefon').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    dauer: parseInt(document.getElementById('f_dauer').value),
    stundenProWoche: parseInt(document.getElementById('f_stundenProWoche').value),
    pauschale,
    tag: document.getElementById('f_tag').value.trim(),
    notizen: document.getElementById('f_notizen').value.trim(),
  };

  if(editingStudentId) {
    const idx = students.findIndex(s => s.id === editingStudentId);
    students[idx] = { ...students[idx], ...data };
  } else {
    data.id = 'S' + Date.now();
    students.push(data);
  }
  save();
  closeModal('studentModal');
  renderStudents();
}

function deleteStudent() {
  if(!confirm('Schüler wirklich löschen? Alle Anwesenheitsdaten werden ebenfalls gelöscht.')) return;
  students = students.filter(s => s.id !== editingStudentId);
  Object.keys(attendance).forEach(date => {
    delete attendance[date][editingStudentId];
  });
  save();
  closeModal('studentModal');
  renderStudents();
}

// ==================== ATTENDANCE ====================
function dateKey(d) {
  return d.toISOString().split('T')[0];
}

function changeDate(dir) {
  currentAttDate.setDate(currentAttDate.getDate() + dir);
  renderAttendance();
}

function renderAttendance() {
  const dk = dateKey(currentAttDate);
  if(!attendance[dk]) attendance[dk] = {};

  document.getElementById('attDateDisplay').textContent =
    currentAttDate.toLocaleDateString('de-DE', {day:'2-digit', month:'long', year:'numeric'});
  document.getElementById('attWeekday').textContent =
    currentAttDate.toLocaleDateString('de-DE', {weekday:'long'});

  const list = document.getElementById('attStudentList');
  if(students.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Keine Schüler vorhanden.<br>Füge zuerst Schüler hinzu.</div></div>`;
    return;
  }
  list.innerHTML = students.map(s => {
    const cur = attendance[dk][s.id] || '';
    return `<div class="att-student-row">
      <div class="att-student-name">${s.vorname} ${s.nachname} <span class="badge ${s.dauer==45?'badge-45':'badge-30'}" style="margin-left:6px;">${s.dauer} Min</span></div>
      <div class="att-buttons">
        <button class="att-btn ${cur==='present'?'selected-present':''}" onclick="setAtt('${dk}','${s.id}','present')">
          <span class="att-icon">✅</span>Anwesend
        </button>
        <button class="att-btn ${cur==='excused'?'selected-excused':''}" onclick="setAtt('${dk}','${s.id}','excused')">
          <span class="att-icon">📝</span>Entschuldigt
        </button>
        <button class="att-btn ${cur==='absent'?'selected-absent':''}" onclick="setAtt('${dk}','${s.id}','absent')">
          <span class="att-icon">❌</span>Gefehlt
        </button>
      </div>
    </div>`;
  }).join('');
}

function setAtt(date, studentId, status) {
  if(!attendance[date]) attendance[date] = {};
  if(attendance[date][studentId] === status) {
    delete attendance[date][studentId];
  } else {
    attendance[date][studentId] = status;
  }
  save();
  renderAttendance();
}

// ==================== BILLING ====================
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function initBillingPickers() {
  const mSel = document.getElementById('billMonth');
  const ySel = document.getElementById('billYear');
  mSel.innerHTML = MONTHS.map((m,i) => `<option value="${i}">${m}</option>`).join('');
  const now = new Date();
  mSel.value = now.getMonth();
  const years = [];
  for(let y = now.getFullYear()-2; y <= now.getFullYear(); y++) years.push(y);
  ySel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  ySel.value = now.getFullYear();
}

function getDaysInMonth(year, month) {
  const days = [];
  const d = new Date(year, month, 1);
  while(d.getMonth() === month) {
    days.push(dateKey(new Date(d)));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function renderBilling() {
  const month = parseInt(document.getElementById('billMonth').value);
  const year = parseInt(document.getElementById('billYear').value);
  const days = getDaysInMonth(year, month);

  let totalIncome = 0;
  let totalPauschale = 0;

  const rows = students.map(s => {
    const presentCount = days.filter(d => attendance[d] && attendance[d][s.id] === 'present').length;
    const absentCount = days.filter(d => attendance[d] && attendance[d][s.id] === 'absent').length;
    const excusedCount = days.filter(d => attendance[d] && attendance[d][s.id] === 'excused').length;
    const totalRecorded = presentCount + absentCount + excusedCount;

    // Abrechnung: nur anwesende Stunden zählen zur Berechnung
    // Pauschale anteilig: Pauschale * (anwesend / (anwesend + unentschuldigt_gefehlt))
    // Vereinfacht: wenn Schüler einfach fehlt → Abzug vom Pauschale anteilig
    // Entschuldigt = kostenlos = volle Pauschale
    // Unentschuldigt = Abzug proportional
    
    // Einnahme = Pauschale - Abzug für unentschuldigte Fehlstunden
    // Stundenrate = Pauschale / (Wochen im Monat * stundenProWoche)
    const weeksInMonth = days.length / 7;
    const expectedSessions = Math.round(weeksInMonth * s.stundenProWoche);
    const hourlyRate = expectedSessions > 0 ? s.pauschale / expectedSessions : 0;
    const abzug = absentCount * hourlyRate;
    const einnahme = Math.max(0, s.pauschale - abzug);
    
    totalIncome += einnahme;
    totalPauschale += s.pauschale;

    return `<div class="month-row">
      <div>
        <div class="month-student">${s.vorname} ${s.nachname}</div>
        <div class="month-detail">
          ✅ ${presentCount} &nbsp; 📝 ${excusedCount} &nbsp; ❌ ${absentCount}
          ${absentCount > 0 ? `&nbsp;· Abzug: ${formatEuro(abzug)}` : ''}
        </div>
      </div>
      <div class="month-amount amount-green">${formatEuro(einnahme)}</div>
    </div>`;
  }).join('');

  const content = document.getElementById('billingContent');
  if(students.length === 0) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">💶</div><div class="empty-text">Keine Schüler vorhanden.</div></div>`;
    return;
  }

  content.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${MONTHS[month]} ${year}</div>
          <div class="card-subtitle">${students.length} Schüler</div>
        </div>
      </div>
      ${rows}
      <div class="divider"></div>
      <div class="month-row">
        <div><strong>Gesamt-Einnahmen</strong></div>
        <div class="month-amount amount-green"><strong>${formatEuro(totalIncome)}</strong></div>
      </div>
    </div>
    <div class="profit-box">
      <div class="profit-label">Netto-Einnahmen ${MONTHS[month]}</div>
      <div class="profit-value">${formatEuro(totalIncome)}</div>
      <div class="text-muted mt-8">Volle Pauschalen: ${formatEuro(totalPauschale)}</div>
    </div>`;
}

// ==================== STATS ====================
function renderStats() {
  const grid = document.getElementById('statsGrid');
  const detail = document.getElementById('statsDetail');

  let totalPresent = 0, totalExcused = 0, totalAbsent = 0;
  Object.keys(attendance).forEach(date => {
    Object.values(attendance[date]).forEach(v => {
      if(v === 'present') totalPresent++;
      else if(v === 'excused') totalExcused++;
      else if(v === 'absent') totalAbsent++;
    });
  });

  const total = totalPresent + totalExcused + totalAbsent;
  const attRate = total > 0 ? Math.round((totalPresent / total) * 100) : 0;

  grid.innerHTML = `
    <div class="stat-card"><div class="stat-value">${students.length}</div><div class="stat-label">Schüler</div></div>
    <div class="stat-card"><div class="stat-value">${attRate}%</div><div class="stat-label">Anwesenheit</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${totalPresent}</div><div class="stat-label">Anwesend</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--red)">${totalAbsent}</div><div class="stat-label">Unentsch. Fehlt</div></div>
  `;

  if(students.length === 0) {
    detail.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Noch keine Daten vorhanden.</div></div>`;
    return;
  }

  detail.innerHTML = `<div class="section-title" style="font-size:1.1rem;margin-top:8px;">Pro Schüler</div>` +
    students.map(s => {
      const hist = getStudentHistory(s.id);
      const p = hist.filter(x=>x==='present').length;
      const e = hist.filter(x=>x==='excused').length;
      const a = hist.filter(x=>x==='absent').length;
      const tot = p+e+a;
      const rate = tot > 0 ? Math.round((p/tot)*100) : 0;
      return `<div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${s.vorname} ${s.nachname}</div>
            <div class="card-subtitle">${s.dauer} Min · ${formatEuro(s.pauschale)}/Monat</div>
          </div>
          <div style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:${rate>=80?'var(--green)':rate>=60?'var(--accent)':'var(--red)'}">${rate}%</div>
        </div>
        <div style="display:flex;gap:12px;font-size:0.82rem;">
          <span>✅ ${p} anwesend</span>
          <span>📝 ${e} entschuldigt</span>
          <span>❌ ${a} gefehlt</span>
        </div>
      </div>`;
    }).join('');
}

// ==================== UTILS ====================
function formatEuro(v) {
  return new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR'}).format(v || 0);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.getElementById('studentModal').addEventListener('click', function(e) {
  if(e.target === this) closeModal('studentModal');
});

// ==================== INIT ====================
initBillingPickers();
renderStudents();
renderAttendance();
</script>
